title: "Kimia Fazeli"
description: "Ph.D. Student | AI & Data Science"
baseurl: "" 
url: "https://kimiafazeli1.github.io"

# Theme and Plugins
remote_theme: "mmistakes/minimal-mistakes"
plugins:
  - jekyll-include-cache

# Navigation
navigation:
  - title: "About"
    url: "/about/"
  - title: "Projects"
    url: "/projects/"
  - title: "Publications"
    url: "/publications/"
  - title: "Teaching"
    url: "/teaching/"
  - title: "Contact"
    url: "/contact/"

# Default Layouts for Pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
      sidebar: true
      toc: true
      classes: "wide"

# Styling and Appearance
minimal_mistakes_skin: "dark"
markdown: kramdown
permalink: pretty
paginate: 5
paginate_path: "/blog/page:num/"
